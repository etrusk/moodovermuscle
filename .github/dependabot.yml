# Dependabot configuration for automated dependency updates
version: 2
updates:
  # npm/pnpm dependency updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Australia/Sydney"
    
    # Separate PRs by update type
    groups:
      non-breaking:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"
    
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: "-"
    
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    
    labels:
      - "dependencies"
      - "automated"
    
    allow:
      - dependency-type: "all"
    
  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Australia/Sydney"
    
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "automated"