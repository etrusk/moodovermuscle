name: Domain Health Check

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual triggering
  push:
    branches: [ main ]
    paths:
      - 'scripts/health-check.js'
      - 'scripts/verify-domain.js'
      - '.github/workflows/domain-health-check.yml'

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 8
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Run domain verification
      run: |
        echo "🔍 Running domain verification..."
        node scripts/verify-domain.js
        
    - name: Run comprehensive health check
      run: |
        echo "🏥 Running comprehensive health check..."
        node scripts/health-check.js
        
    - name: Test error scenarios
      run: |
        echo "🧪 Testing error scenarios..."
        node scripts/test-error-scenarios.js
        
    - name: Validate build configuration
      run: |
        echo "🔧 Validating build configuration..."
        node scripts/build-validation.js
        
    - name: Create health report
      if: always()
      run: |
        echo "📊 Creating health report..."
        echo "## Domain Health Report - $(date)" > health-report.md
        echo "" >> health-report.md
        echo "### Domain Status" >> health-report.md
        node scripts/verify-domain.js >> health-report.md 2>&1 || echo "Domain verification failed" >> health-report.md
        echo "" >> health-report.md
        echo "### Health Check Results" >> health-report.md
        node scripts/health-check.js >> health-report.md 2>&1 || echo "Health check failed" >> health-report.md
        echo "" >> health-report.md
        echo "### Error Testing Results" >> health-report.md
        node scripts/test-error-scenarios.js >> health-report.md 2>&1 || echo "Error testing failed" >> health-report.md
        
    - name: Upload health report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: health-report-${{ github.run_number }}
        path: health-report.md
        retention-days: 30
        
    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ Health check failed!"
        echo "Check the logs above for details."
        echo "Domain: moodovermuscle.com.au may be experiencing issues."
        exit 1