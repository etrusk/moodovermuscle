name: Vercel Deployment & Health Monitoring

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run health checks every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  deployment-status:
    runs-on: ubuntu-latest
    name: Check Deployment Status
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Build validation
        run: pnpm run build-validate
        
      - name: Type check
        run: pnpm run type-check || echo "Type check completed"
        
      - name: Build check
        run: pnpm build
        
      - name: Comment deployment info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const branchName = context.payload.pull_request.head.ref;
            const deploymentUrl = `https://moodovermuscle-git-${branchName.replace(/[^a-zA-Z0-9]/g, '-')}-redundant-koalas-projects-c165d4a1.vercel.app`;
            
            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: `🚀 **Preview Deployment**
              
              Your changes have been deployed to Vercel:
              - **Preview URL**: ${deploymentUrl}
              - **Branch**: \`${branchName}\`
              - **Commit**: ${context.sha.substring(0, 7)}
              
              The deployment will be automatically cleaned up when this PR is closed.`
            });

  health-monitoring:
    runs-on: ubuntu-latest
    name: Domain Health Monitoring
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run domain verification
        run: pnpm run verify-domain
        continue-on-error: true
        
      - name: Run comprehensive health check
        id: health-check
        run: |
          pnpm run health-check > health-report.txt 2>&1
          echo "health_status=$?" >> $GITHUB_OUTPUT
        continue-on-error: true
        
      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: health-report-${{ github.run_number }}
          path: health-report.txt
          retention-days: 30
        
      - name: Create issue on health check failure
        if: steps.health-check.outputs.health_status != '0' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let healthReport = '';
            try {
              healthReport = fs.readFileSync('health-report.txt', 'utf8');
            } catch (error) {
              healthReport = 'Health report file not found';
            }
            
            const title = `🚨 Health Check Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Health Check Failure Report
            
            The automated health monitoring detected issues with moodovermuscle.com.au.
            
            **Timestamp:** ${new Date().toISOString()}
            **Trigger:** Scheduled health check
            **Status:** ❌ FAILED
            
            ### Health Report Details:
            \`\`\`
            ${healthReport}
            \`\`\`
            
            ### Recommended Actions:
            1. Check domain DNS configuration
            2. Verify SSL certificate status
            3. Test website accessibility manually
            4. Check Vercel deployment status
            5. Review recent changes that might have caused issues
            
            ### Quick Links:
            - [Vercel Dashboard](https://vercel.com/dashboard)
            - [Domain Registrar](https://your-domain-registrar.com)
            - [Live Site](https://moodovermuscle.com.au)
            
            This issue was automatically created by the health monitoring system.
            `;
            
            // Check if there's already an open health check issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['health-check', 'automated']
            });
            
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['health-check', 'automated', 'bug']
              });
            } else {
              // Update existing issue with new report
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `## Updated Health Check Report - ${new Date().toISOString()}
                
                \`\`\`
                ${healthReport}
                \`\`\`
                `
              });
            }
        
      - name: Close health check issues on success
        if: steps.health-check.outputs.health_status == '0' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            // Close any open health check issues since the site is now healthy
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['health-check', 'automated']
            });
            
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **Health Check Resolved**
                
                The automated health monitoring confirms that moodovermuscle.com.au is now healthy and functioning properly.
                
                **Timestamp:** ${new Date().toISOString()}
                **Status:** ✅ HEALTHY
                
                Closing this issue automatically.`
              });
              
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }