# Docker Compose configuration for MoodOverMuscle local development environment
# This sets up a development container with hot-reload and volume mounts
# Note: This is for local development only. Production deployment uses Vercel.

version: '3.8'

services:
  moodovermuscle-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: moodovermuscle-development
    ports:
      - "3001:3000"  # Map external port 3001 to internal port 3000
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - CHOKIDAR_USEPOLLING=true  # Enable polling for file changes in Docker
      - WATCHPACK_POLLING=true    # Additional polling for webpack
    volumes:
      # Mount source code for live editing (hot-reload)
      - ./app:/app/app:cached
      - ./components:/app/components:cached
      - ./lib:/app/lib:cached

      - ./public:/app/public:cached
      - ./package.json:/app/package.json:ro
      - ./next.config.mjs:/app/next.config.mjs:ro
      - ./tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./postcss.config.mjs:/app/postcss.config.mjs:ro
      - ./components.json:/app/components.json:ro
      # Mount logs directory for debugging
      - ./logs:/app/logs
      # Exclude node_modules to prevent conflicts
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    networks:
      - moodovermuscle-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  moodovermuscle-network:
    driver: bridge
    name: moodovermuscle-dev-network