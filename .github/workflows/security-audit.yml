# Weekly scheduled security audit
# Creates a GitHub issue if vulnerabilities are found in production dependencies
name: Security Audit

on:
  schedule:
    # Every Monday at 08:00 UTC (18:00 AEST)
    - cron: '0 8 * * 1'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  audit:
    name: audit-production-deps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run security audit
        id: audit
        run: |
          if ! pnpm audit --audit-level moderate --production > audit-output.txt 2>&1; then
            echo "has_vulnerabilities=true" >> "$GITHUB_OUTPUT"
            cat audit-output.txt
          else
            echo "has_vulnerabilities=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create issue if vulnerabilities found
        if: steps.audit.outputs.has_vulnerabilities == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const auditOutput = fs.readFileSync('audit-output.txt', 'utf8');

            // Check for existing open audit issue to avoid duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
            });
            const existing = issues.find(i => i.title.startsWith('Security audit:'));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `## Weekly audit update (${new Date().toISOString().slice(0, 10)})\n\n\`\`\`\n${auditOutput.slice(0, 3000)}\n\`\`\``,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security audit: vulnerabilities found (${new Date().toISOString().slice(0, 10)})`,
              labels: ['security'],
              body: `## Production dependency vulnerabilities detected\n\nThe weekly security audit found vulnerabilities in production dependencies.\n\n\`\`\`\n${auditOutput.slice(0, 3000)}\n\`\`\`\n\n### Next steps\n1. Run \`pnpm audit --production\` locally to see full details\n2. Update affected packages: \`pnpm update <package>\`\n3. If a direct fix isn't available, add a pnpm override in \`package.json\`\n4. Close this issue when resolved`,
            });
