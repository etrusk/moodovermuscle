name: Lighthouse Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly audits
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  lighthouse-audit:
    runs-on: ubuntu-latest
    name: Performance & Accessibility Audit
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Wait for Vercel deployment
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: sleep 60  # Give Vercel time to deploy
        
      - name: Audit production site
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://moodovermuscle.com.au/
            https://moodovermuscle.com.au/classes
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: '.github/lighthouse-config.json'
        
      - name: Create issue on audit failure
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const title = `🚨 Lighthouse Audit Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Performance & Accessibility Audit Failed
            
            The automated Lighthouse audit detected issues with the website performance or accessibility.
            
            **Timestamp:** ${new Date().toISOString()}
            **Trigger:** ${github.event_name}
            
            ### Recommended Actions:
            1. Check the audit results in the workflow artifacts
            2. Review recent changes that might have affected performance
            3. Optimize images and assets if needed
            4. Fix any accessibility issues detected
            
            ### Quick Links:
            - [Workflow Run](https://github.com/${owner}/${repo}/actions/runs/${github.run_id})
            - [Vercel Dashboard](https://vercel.com/dashboard)
            - [Live Site](https://moodovermuscle.com.au)
            
            This issue was automatically created by the Lighthouse audit workflow.
            `;
            
            // Check if there's already an open lighthouse audit issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: ['lighthouse-audit', 'automated']
            });
            
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner,
                repo,
                title: title,
                body: body,
                labels: ['lighthouse-audit', 'automated', 'performance']
              });
            } else {
              // Update existing issue with new report
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issues[0].number,
                body: `## Updated Lighthouse Audit Report - ${new Date().toISOString()}
                
                Another audit failure was detected. Please check the latest workflow run for details.
                
                [Workflow Run](https://github.com/${owner}/${repo}/actions/runs/${github.run_id})
                `
              });
            }