# Comprehensive CI/CD workflow for validation, quality checks, and Vercel deployments
name: CI/CD

# Define triggers for the workflow
on:
  # Run on pushes to the main branch
  push:
    branches: [main]
  # Run on pull requests targeting the main branch
  pull_request:
    branches: [main]
  # Allow manual triggering
  workflow_dispatch:

# Set default environment variables
env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  # Vercel environment variables for connecting the project
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# Define workflow jobs
jobs:
  # Job for linting and type-checking the codebase
  lint-and-typecheck:
    name: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint code
        run: pnpm lint
      - name: Run type-check
        run: pnpm type-check

  # Job for running critical tests (must pass)
  test-critical:
    name: test-critical
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run critical tests
        run: pnpm test:critical:ci
      - name: Upload code coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Job for running integration tests (allowed to fail with warning)
  test-integration:
    name: test-integration
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run integration tests
        run: pnpm test:integration:ci
      - name: Comment on PR if integration tests fail
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Integration tests are failing** but this PR can still be merged. Please check `.docs/failing-tests.md` for tracked issues and resolution timeline.'
            })

  # Job for building the application
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build application
        run: pnpm build

  # Job for checking the bundle size to prevent regressions
  size-check:
    name: size-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build application
        run: pnpm build
      - name: Check bundle size
        uses: preactjs/compressed-size-action@v2
        with:
          pattern: '.next/**/*.{js,css}'
          exclude: '{.next/cache/**}'

  # Job for running Lighthouse CI to audit performance and accessibility
  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Lighthouse CI with automated quality gates
        run: pnpm lighthouse:ci

  # Job for deploying the application to Vercel
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    # This job requires critical quality checks to pass (integration tests can fail)
    needs: [lint-and-typecheck, test-critical, build, size-check, lighthouse]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      # Use the official Vercel GitHub Action
      - name: Deploy to Vercel
        uses: vercel/action@v3
        with:
          # Use token from secrets
          token: ${{ secrets.VERCEL_TOKEN }}
          # The action automatically deploys to production for pushes to the main branch
          # and to a preview environment for pull requests. It also handles PR comments.
